# Client-count sensitivity: low writer cardinality.
# Purpose: VV metadata should be less stressed when fewer distinct client actors write objects.

clocks: [vv, dvv, lease_dvv]
profiles: [stable, sustained]
actor-domain: client

seeds: [1, 2, 3]

sim-time: 240.0
initial-size: 10
write-interval: 5.0
client-think-time: 4.0
merge-probability: 0.35
burst-interval: 18.0
burst-writers: 4
burst-spread: 2.0
merge-delay: 10.0
same-coordinator-probability: 0.75
max-nodes: 28
min-nodes: 4
min-lat: 1.0
max-lat: 5.0
key-count: 12
hot-key-probability: 0.65
client-count: 32
replication-factor: 4
sample-interval: 10.0
lease-duration: 16.0
lease-durations: [8.0, 16.0, 32.0]
analysis-window: 12.0
output-dir: output/experiments
experiment-name: sensitivity_client_count_32
