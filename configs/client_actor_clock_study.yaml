# Apples-to-apples dynamic-client clock comparison.
# All exact clocks in this config track the same client actor domain:
#   vv         = exact client-actor version vector
#   dvv_client = exact client-actor dotted version vector
#   itc        = exact client-actor interval tree clock
# Lease-DVV-client is included as the approximate/pruned variant over the same domain.
# Run with:
#   scripts/reproduce_final.sh configs/client_actor_clock_study.yaml

clocks:
  - vv
  - dvv_client
  - itc
  - lease_dvv_client
profiles:
  - stable
  - low
  - sustained
  - burst

actor-domain: client

seeds:
  - 1
  - 2
  - 3
  - 4
  - 5

sim-time: 120.0
initial-size: 10
write-interval: 2.0
client-think-time: 1.0
merge-probability: 0.5
burst-interval: 12.0
burst-writers: 8
burst-spread: 1.0
merge-delay: 4.0
same-coordinator-probability: 0.5
max-nodes: 28
min-nodes: 4
min-lat: 0.5
max-lat: 2.0
key-count: 6
hot-key-probability: 0.8
client-count: 1024
replication-factor: 4
sample-interval: 10.0
lease-duration: 16.0
lease-durations:
  - 8.0
  - 16.0
  - 32.0
analysis-window: 10.0
output-dir: output/experiments
experiment-name: client_actor_clock_study
