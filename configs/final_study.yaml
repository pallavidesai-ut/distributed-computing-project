# Publication-oriented experiment matrix.
# Run with: scripts/reproduce_final.sh configs/final_study.yaml

clocks:
  - vv
  - dvv
  - lease_dvv
  - vv_vnode
profiles:
  - stable
  - low
  - sustained
  - burst

# Five seeds is the minimum paper-ready sweep. Increase to 10 if runtime allows.
seeds:
  - 1
  - 2
  - 3
  - 4
  - 5

sim-time: 240.0
initial-size: 10
write-interval: 5.0
client-think-time: 4.0
merge-probability: 0.35
burst-interval: 18.0
burst-writers: 4
burst-spread: 2.0
merge-delay: 10.0
same-coordinator-probability: 0.75
max-nodes: 28
min-nodes: 4
min-lat: 1.0
max-lat: 5.0
key-count: 12
hot-key-probability: 0.65
client-count: 128
replication-factor: 4
sample-interval: 10.0
lease-duration: 16.0
lease-durations:
  - 8.0
  - 16.0
  - 32.0
analysis-window: 12.0
output-dir: output/experiments
experiment-name: per_object_clock_study_final
